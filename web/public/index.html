<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Switchboard Agent</title>
    <script>
      (() => {
        const storageKey = "switchboard-theme";
        const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        let storedTheme = null;

        try {
          storedTheme = localStorage.getItem(storageKey);
          localStorage.removeItem("switchboard-current-chat");
        } catch (error) {
          storedTheme = null;
        }

        const theme = storedTheme || (systemPrefersDark ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="stylesheet" href="style.css" />
    <style>
      .app-shell {
        grid-template-columns: minmax(0, 1fr);
      }

      .sidebar,
      .mobile-new-chat,
      .compact-status,
      .header-spacer {
        display: none !important;
      }

      .chat-panel {
        grid-template-rows: 64px minmax(0, 1fr) auto;
      }

      .chat-header {
        justify-content: space-between;
        padding: 0 clamp(12px, 3vw, 24px);
      }

      .chat-close-button {
        display: inline-grid;
        place-items: center;
        width: 42px;
        height: 42px;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 50%;
        background: transparent;
        color: var(--text);
        font-size: 1.35rem;
        font-weight: 700;
        line-height: 1;
      }

      .chat-close-button:hover:not(:disabled),
      .chat-close-button:focus-visible:not(:disabled) {
        background: var(--panel-soft);
        border-color: var(--composer-border);
      }

      .header-actions {
        width: auto;
        justify-content: flex-end;
      }

      .messages {
        display: flex;
        flex-direction: column;
        padding-inline: clamp(12px, 4vw, 24px);
      }

      .start-chat-empty {
        margin: auto;
        color: var(--text);
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        font-weight: 800;
        line-height: 1.1;
        text-align: center;
      }

      .composer {
        left: max(12px, calc((100vw - 960px) / 2 + 12px));
        right: max(12px, calc((100vw - 960px) / 2 + 12px));
      }

      @media (max-width: 900px) {
        .chat-header {
          min-height: 58px;
        }

        .chat-close-button {
          width: 38px;
          height: 38px;
          min-height: 38px;
          font-size: 1.25rem;
        }

        .composer {
          left: 12px;
          right: 12px;
          bottom: max(12px, env(safe-area-inset-bottom));
        }
      }

      @media (max-width: 420px) {
        #themeToggleText {
          display: inline;
        }

        .theme-toggle {
          min-width: 44px;
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell" aria-label="Switchboard Agent messaging app">
      <aside class="sidebar" aria-label="Navigation, chats, and agent status" hidden>
        <div class="sidebar-topbar">
          <a class="brand-lockup" href="/" aria-label="Switchboard Agent home">
            <span class="brand-mark" aria-hidden="true">★</span>
            <span>Switchboard</span>
          </a>
        </div>

        <nav class="primary-nav" aria-label="Primary navigation">
          <button class="nav-item" id="newChatButton" type="button"><span aria-hidden="true">✎</span>New chat</button>
        </nav>

        <section class="session-panel" aria-label="Chat sessions">
          <div class="session-heading">
            <h2>Chats</h2>
          </div>
          <div class="chat-list" id="chatList" aria-live="polite"></div>
        </section>

        <section class="agents-panel" id="availableUsersPanel" aria-label="Available users" hidden>
          <h2>Users</h2>
          <div class="chat-list" id="availableUsersList" role="list" aria-live="polite"></div>
        </section>

        <section class="agents-panel" aria-label="Agents">
          <h2>Agents</h2>
          <div class="agent-pill active">
            <span class="brand-mark small" aria-hidden="true">★</span>
            <span>Switchboard_Agent</span>
          </div>
        </section>

        <div class="directory-card">
          <div class="status-row">
            <span class="status-dot" id="statusDot" aria-hidden="true"></span>
            <span id="statusText">Checking directory...</span>
          </div>
          <p id="filesLoaded">Loading routing context</p>
          <p id="storageStatus">Checking storage</p>
        </div>
      </aside>

      <section class="chat-panel" aria-label="Chat with Switchboard Agent">
        <header class="chat-header">
          <button class="chat-close-button" id="closeChatButton" type="button" aria-label="Close chat and start a new chat">×</button>
          <button class="mobile-new-chat" id="mobileNewChatButton" type="button">New chat</button>
          <div class="header-spacer" aria-hidden="true"></div>
          <div class="header-actions">
            <button
              class="theme-toggle"
              id="themeToggle"
              type="button"
              aria-label="Switch to dark mode"
              aria-pressed="false"
            >
              <span class="theme-toggle-icon" aria-hidden="true">☾</span>
              <span id="themeToggleText">Dark Mode</span>
            </button>
            <div class="compact-status" hidden>
              <span class="status-dot" aria-hidden="true"></span>
              <span id="mobileStatusText">Online</span>
            </div>
          </div>
        </header>

        <div class="messages" id="messages" aria-live="polite"></div>

        <form class="composer" id="chatForm">
          <div class="composer-agent-bar">
            <span class="brand-mark small" aria-hidden="true">★</span>
            <strong id="currentChatTitle">New chat</strong>
          </div>
          <div class="attachment-tray" id="attachmentTray" aria-live="polite"></div>
          <div class="composer-input-row">
            <button class="composer-tool" id="filePickerButton" type="button" aria-label="Upload files">+</button>
            <input
              class="visually-hidden"
              id="fileInput"
              type="file"
              multiple
              accept=".txt,.md,.csv,.json,.log,.html,.css,.js,.jsx,.ts,.tsx,.xml,.yaml,.yml,text/*,application/json"
            />
            <label class="visually-hidden" for="messageInput">Message</label>
            <textarea
              id="messageInput"
              name="message"
              rows="1"
              placeholder="Start new chat"
              autocomplete="off"
            ></textarea>
            <button class="send-button" type="submit" id="sendButton" aria-label="Send message">↑</button>
          </div>
        </form>
      </section>
    </main>

    <script src="app.js?v=20260606-close-chat"></script>
    <script>
      (() => {
        const setNewChatLabel = () => {
          const title = document.getElementById("currentChatTitle");
          const input = document.getElementById("messageInput");
          if (title && title.textContent !== "New chat") title.textContent = "New chat";
          if (input) input.placeholder = "Start new chat";
        };
        window.addEventListener("load", setNewChatLabel, { once: true });
        requestAnimationFrame(setNewChatLabel);
        setTimeout(setNewChatLabel, 300);
      })();
    </script>
  </body>
</html>
