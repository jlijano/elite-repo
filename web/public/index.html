<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Switchboard Agent</title>
    <script>
      (() => {
        const storageKey = "switchboard-theme";
        const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        let storedTheme = null;

        try {
          storedTheme = localStorage.getItem(storageKey);
        } catch (error) {
          storedTheme = null;
        }

        const theme = storedTheme || (systemPrefersDark ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="Switchboard Agent messaging app">
      <aside class="sidebar" aria-label="Chat sessions and application details">
        <div>
          <p class="eyebrow">Agent Workspace</p>
          <h1>Switchboard Agent</h1>
          <p class="subtitle">AI routing and agent coordination</p>
        </div>

        <section class="session-panel" aria-label="Chat sessions">
          <div class="session-heading">
            <h2>Chats</h2>
            <button class="secondary-button" id="newChatButton" type="button">New Chat</button>
          </div>
          <div class="chat-list" id="chatList" aria-live="polite"></div>
        </section>

        <div class="directory-card">
          <div class="status-row">
            <span class="status-dot" id="statusDot" aria-hidden="true"></span>
            <span id="statusText">Checking directory...</span>
          </div>
          <p id="filesLoaded">Loading routing context</p>
          <p id="storageStatus">Checking storage</p>
        </div>

        <p class="footer-note">Render deploys from GitHub main after checks pass.</p>
      </aside>

      <section class="chat-panel" aria-label="Chat with Switchboard Agent">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Live chat</p>
            <h2 id="currentChatTitle">Switchboard Agent</h2>
          </div>
          <div class="header-actions">
            <button class="mobile-new-chat" id="mobileNewChatButton" type="button">New Chat</button>
            <button
              class="theme-toggle"
              id="themeToggle"
              type="button"
              aria-label="Switch to dark mode"
              aria-pressed="false"
            >
              <span class="theme-toggle-icon" aria-hidden="true">☾</span>
              <span id="themeToggleText">Dark Mode</span>
            </button>
            <div class="compact-status">
              <span class="status-dot" aria-hidden="true"></span>
              <span id="mobileStatusText">Online</span>
            </div>
          </div>
        </header>

        <div class="messages" id="messages" aria-live="polite"></div>

        <form class="composer" id="chatForm">
          <label class="visually-hidden" for="messageInput">Message</label>
          <textarea
            id="messageInput"
            name="message"
            rows="1"
            placeholder="Message the Switchboard Agent"
            autocomplete="off"
          ></textarea>
          <button type="submit" id="sendButton">Send</button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
