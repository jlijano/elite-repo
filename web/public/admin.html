<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Switchboard Admin</title>
    <style>
      :root { --bg: #f4f6f8; --panel: #fff; --soft: #f8fafc; --text: #172033; --muted: #667085; --line: #d9e1ea; --primary: #12b76a; --error: #b42318; --radius: 8px; }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: min(1180px, calc(100vw - 32px)); margin: 16px auto; }
      header, .auth, .summary, section { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); }
      header { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 18px; margin-bottom: 12px; }
      h1, h2 { margin: 0; }
      h1 { font-size: 1.35rem; }
      h2 { font-size: 1rem; }
      a, button { min-height: 38px; border-radius: var(--radius); font-weight: 800; }
      a { display: inline-flex; align-items: center; padding: 0 12px; color: var(--text); border: 1px solid var(--line); text-decoration: none; background: var(--soft); }
      button { padding: 0 12px; color: #fff; background: var(--primary); border: 0; cursor: pointer; }
      input, select { min-height: 38px; min-width: 0; padding: 0 10px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; color: var(--text); }
      .auth { display: grid; grid-template-columns: auto minmax(180px, 1fr) auto auto; align-items: center; gap: 10px; padding: 14px; margin-bottom: 12px; }
      .status { margin: 0 0 12px; padding: 10px 14px; color: var(--muted); }
      .status.error { color: var(--error); }
      .summary { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 10px; padding: 12px; margin-bottom: 12px; }
      .metric { padding: 10px; background: var(--soft); border: 1px solid var(--line); border-radius: var(--radius); }
      .metric span { display: block; color: var(--muted); font-size: .75rem; font-weight: 800; text-transform: uppercase; }
      .metric strong { display: block; margin-top: 4px; font-size: 1.2rem; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      section { min-height: 280px; overflow: hidden; }
      .section-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px; border-bottom: 1px solid var(--line); background: var(--soft); }
      .list, .detail { max-height: 460px; overflow: auto; padding: 12px; }
      .item { display: grid; gap: 8px; padding: 12px; border: 1px solid var(--line); border-radius: var(--radius); }
      .item + .item { margin-top: 10px; }
      .row { display: flex; justify-content: space-between; gap: 10px; font-weight: 800; }
      p { margin: 0; color: var(--muted); line-height: 1.45; overflow-wrap: anywhere; }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; }
      .actions button { min-height: 34px; color: var(--text); background: var(--soft); border: 1px solid var(--line); }
      @media (max-width: 820px) { main { width: 100vw; margin: 0; padding: 10px; } .auth, .summary, .grid { grid-template-columns: 1fr; } header { align-items: flex-start; flex-direction: column; } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Switchboard Admin</h1>
          <p>Inspect chats, review knowledge, and run durable review jobs.</p>
        </div>
        <a href="/">Back to chat</a>
      </header>

      <div class="auth">
        <label for="token">Admin token</label>
        <input id="token" type="password" autocomplete="off" placeholder="Enter ADMIN_TOKEN" />
        <button id="load" type="button">Load</button>
        <button id="run" type="button">Run Review</button>
      </div>
      <p class="status" id="status">Admin routes require the backend ADMIN_TOKEN.</p>
      <div class="summary" id="summary"></div>

      <div class="grid">
        <section>
          <div class="section-head"><h2>Chats</h2></div>
          <div class="list" id="chats">No data loaded.</div>
        </section>
        <section>
          <div class="section-head"><h2>Chat Detail</h2></div>
          <div class="detail" id="chatDetail">Select a chat to inspect messages.</div>
        </section>
        <section>
          <div class="section-head">
            <h2>Knowledge</h2>
            <select id="knowledgeStatus">
              <option value="all">All</option>
              <option value="pending_review">Pending</option>
              <option value="approved">Approved</option>
              <option value="archived">Archived</option>
            </select>
          </div>
          <div class="list" id="knowledge">No data loaded.</div>
        </section>
        <section>
          <div class="section-head"><h2>Review Runs</h2></div>
          <div class="list" id="runs">No data loaded.</div>
        </section>
      </div>
    </main>

    <script>
      const els = {
        token: document.getElementById("token"),
        load: document.getElementById("load"),
        run: document.getElementById("run"),
        status: document.getElementById("status"),
        summary: document.getElementById("summary"),
        chats: document.getElementById("chats"),
        chatDetail: document.getElementById("chatDetail"),
        knowledgeStatus: document.getElementById("knowledgeStatus"),
        knowledge: document.getElementById("knowledge"),
        runs: document.getElementById("runs")
      };
      let token = sessionStorage.getItem("switchboard-admin-token") || "";
      els.token.value = token;

      const html = (value) => String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      const time = (value) => value ? new Intl.DateTimeFormat(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }).format(new Date(value)) : "";
      const setStatus = (message, error = false) => { els.status.textContent = message; els.status.classList.toggle("error", error); };
      const headers = () => ({ "Content-Type": "application/json", "x-admin-token": token });
      async function api(url, options = {}) {
        const res = await fetch(url, { ...options, headers: { ...headers(), ...(options.headers || {}) } });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Request failed.");
        return data;
      }
      function saveToken() {
        token = els.token.value.trim();
        sessionStorage.setItem("switchboard-admin-token", token);
      }
      function renderSummary(summary = {}, runtime = {}) {
        const metrics = [["Chats", summary.chats], ["Messages", summary.messages], ["Unreviewed", summary.unreviewedMessages], ["Pending KB", summary.pendingKnowledge], ["Approved KB", summary.approvedKnowledge], ["Storage", runtime.storageMode]];
        els.summary.innerHTML = metrics.map(([label, value]) => `<div class="metric"><span>${html(label)}</span><strong>${html(value ?? 0)}</strong></div>`).join("");
      }
      function renderChats(chats = []) {
        els.chats.innerHTML = chats.length ? chats.map((chat) => `<article class="item"><div class="row"><span>${html(chat.title || "New chat")}</span><small>${html(chat.messageCount)} msg</small></div><p>Updated ${html(time(chat.updatedAt))}</p><div class="actions"><button data-chat="${html(chat.id)}">Inspect</button></div></article>`).join("") : "No chats found.";
        els.chats.querySelectorAll("[data-chat]").forEach((button) => button.addEventListener("click", () => loadChat(button.dataset.chat)));
      }
      function renderKnowledge(entries = []) {
        els.knowledge.innerHTML = entries.length ? entries.map((entry) => `<article class="item"><div class="row"><span>${html(entry.title)}</span><small>${html(entry.status)}</small></div><p>${html(entry.content.slice(0, 700))}</p><p>Created ${html(time(entry.createdAt))}</p><div class="actions"><button data-id="${html(entry.id)}" data-status="approved">Approve</button><button data-id="${html(entry.id)}" data-status="pending_review">Pending</button><button data-id="${html(entry.id)}" data-status="archived">Archive</button></div></article>`).join("") : "No knowledge entries found.";
        els.knowledge.querySelectorAll("[data-id]").forEach((button) => button.addEventListener("click", () => updateKnowledge(button.dataset.id, button.dataset.status)));
      }
      function renderRuns(runs = []) {
        els.runs.innerHTML = runs.length ? runs.map((run) => `<article class="item"><div class="row"><span>${html(run.status)}</span><small>${html(time(run.startedAt))}</small></div><p>${html(run.messagesReviewed)} messages reviewed, ${html(run.knowledgeEntriesCreated)} KB entries created.</p>${run.error ? `<p>${html(run.error)}</p>` : ""}</article>`).join("") : "No review runs yet.";
      }
      async function loadDashboard() {
        saveToken();
        if (!token) return setStatus("Enter ADMIN_TOKEN to load management data.", true);
        setStatus("Loading admin data...");
        try {
          const [summary, chats, knowledge, runs] = await Promise.all([
            api("/api/admin/summary"),
            api("/api/admin/chats"),
            api(`/api/admin/knowledge?status=${encodeURIComponent(els.knowledgeStatus.value)}`),
            api("/api/admin/review-runs")
          ]);
          renderSummary(summary.summary, summary.status);
          renderChats(chats.chats || []);
          renderKnowledge(knowledge.entries || []);
          renderRuns(runs.runs || []);
          setStatus("Admin data loaded.");
        } catch (error) {
          setStatus(error.message, true);
        }
      }
      async function loadChat(chatId) {
        const data = await api(`/api/admin/chats/${encodeURIComponent(chatId)}`);
        els.chatDetail.innerHTML = `<article class="item"><div class="row"><span>${html(data.chat.title)}</span><small>${html(data.chat.messages.length)} messages</small></div>${data.chat.messages.map((m) => `<p><strong>${html(m.role)}</strong> ${html(time(m.createdAt))}</p><p>${html(m.content)}</p>`).join("")}</article>`;
      }
      async function updateKnowledge(entryId, status) {
        await api(`/api/admin/knowledge/${encodeURIComponent(entryId)}`, { method: "PATCH", body: JSON.stringify({ status }) });
        await loadDashboard();
      }
      async function runReview() {
        saveToken();
        setStatus("Running review...");
        try {
          const data = await api("/api/admin/reviews/run", { method: "POST", body: "{}" });
          setStatus(`Review ${data.run.status}: ${data.run.messagesReviewed} messages reviewed, ${data.run.knowledgeEntriesCreated} KB entries created.`);
          await loadDashboard();
        } catch (error) {
          setStatus(error.message, true);
        }
      }
      els.load.addEventListener("click", loadDashboard);
      els.run.addEventListener("click", runReview);
      els.knowledgeStatus.addEventListener("change", loadDashboard);
      setInterval(() => token && loadDashboard().catch(() => {}), 40000);
    </script>
  </body>
</html>
