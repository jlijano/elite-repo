<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Switchboard Login</title>
    <script>
      (() => {
        const storageKey = "switchboard-theme";
        const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        let storedTheme = null;
        try { storedTheme = localStorage.getItem(storageKey); } catch (error) { storedTheme = null; }
        document.documentElement.dataset.theme = storedTheme || (systemPrefersDark ? "dark" : "light");
      })();
    </script>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <main class="login-shell" aria-label="Switchboard login page">
      <section class="login-panel">
        <a class="brand-lockup" href="/" aria-label="Switchboard Agent home">
          <span class="brand-mark" aria-hidden="true">★</span>
          <span>Switchboard</span>
        </a>
        <h1>Login</h1>
        <p class="admin-status" id="loginStatus" hidden>Ready to log in.</p>
        <form class="management-form" id="loginForm" autocomplete="on">
          <a class="secondary-action" id="googleLogin" href="/api/auth/google" hidden>Continue with Google</a>
          <a class="secondary-action" id="githubLogin" href="/api/auth/github" hidden>Continue with GitHub</a>
          <label>
            <span>Email address</span>
            <input id="loginEmail" name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>Password</span>
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
          </label>
          <div class="form-actions">
            <a class="secondary-action" href="/">Back to chat</a>
            <button type="submit">Log in</button>
          </div>
        </form>
      </section>
    </main>
    <script src="login.js"></script>
  </body>
</html>
