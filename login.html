<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f0e8;
      --panel: #fffaf2;
      --text: #1e2930;
      --muted: #65727a;
      --accent: #126a6a;
      --accent-strong: #0c4f4e;
      --line: rgba(30, 41, 48, 0.14);
      --shadow: 0 24px 80px rgba(23, 45, 49, 0.18);
      --focus: rgba(18, 106, 106, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(18, 106, 106, 0.16), transparent 34rem),
        linear-gradient(135deg, #f8f4ec 0%, var(--bg) 42%, #e9efe8 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    main {
      width: min(100%, 980px);
      min-height: 620px;
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(360px, 0.92fr);
      overflow: hidden;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .brand-panel {
      position: relative;
      isolation: isolate;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 36px;
      padding: 44px;
      color: white;
      background:
        linear-gradient(rgba(8, 42, 45, 0.34), rgba(8, 42, 45, 0.58)),
        url("https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1200&q=80") center / cover;
    }

    .brand-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(135deg, rgba(6, 51, 53, 0.58), rgba(9, 95, 92, 0.1));
    }

    .logo {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1.05rem;
    }

    .logo-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(10px);
      font-weight: 900;
    }

    .brand-copy {
      max-width: 440px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.6rem, 6vw, 5rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .brand-copy p {
      margin: 0;
      max-width: 34rem;
      font-size: 1.05rem;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.82);
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 0.92rem;
    }

    .status-row span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
    }

    .status-row span::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #79f0d2;
      box-shadow: 0 0 0 4px rgba(121, 240, 210, 0.16);
    }

    .login-panel {
      display: flex;
      align-items: center;
      padding: 48px clamp(28px, 6vw, 64px);
    }

    .login-box {
      width: 100%;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h2 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.35rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .intro {
      margin: 16px 0 32px;
      color: var(--muted);
      line-height: 1.65;
    }

    form {
      display: grid;
      gap: 18px;
    }

    label {
      display: grid;
      gap: 8px;
      color: #32414a;
      font-size: 0.94rem;
      font-weight: 700;
    }

    .input-wrap {
      position: relative;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      min-height: 54px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.74);
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--focus);
      background: white;
    }

    .password-field input {
      padding-right: 88px;
    }

    .toggle-password {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      min-width: 68px;
      min-height: 38px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--accent);
      font: inherit;
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;
    }

    .toggle-password:hover,
    .toggle-password:focus-visible {
      background: rgba(18, 106, 106, 0.1);
      outline: none;
    }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-weight: 650;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    a {
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-strong);
      text-decoration: underline;
    }

    .submit-btn {
      min-height: 56px;
      border: 0;
      border-radius: 14px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(18, 106, 106, 0.28);
      transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .submit-btn:hover,
    .submit-btn:focus-visible {
      background: var(--accent-strong);
      transform: translateY(-1px);
      box-shadow: 0 16px 34px rgba(18, 106, 106, 0.34);
      outline: none;
    }

    .signup {
      margin: 26px 0 0;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .message {
      min-height: 22px;
      margin: 0;
      color: var(--accent-strong);
      font-size: 0.92rem;
      font-weight: 750;
    }

    @media (max-width: 820px) {
      body {
        padding: 0;
        place-items: stretch;
      }

      main {
        min-height: 100svh;
        grid-template-columns: 1fr;
        border: 0;
        border-radius: 0;
      }

      .brand-panel {
        min-height: 310px;
        padding: 28px;
      }

      .status-row {
        display: none;
      }

      .login-panel {
        align-items: start;
        padding: 34px 22px 44px;
      }
    }

    @media (max-width: 460px) {
      .brand-panel {
        min-height: 250px;
      }

      h1 {
        font-size: 2.45rem;
      }

      .form-options {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="brand-panel" aria-label="Welcome">
      <div class="logo" aria-label="Northstar">
        <span class="logo-mark">N</span>
        <span>Northstar</span>
      </div>

      <div class="brand-copy">
        <h1>Welcome back.</h1>
        <p>Sign in to continue managing projects, approvals, and updates from one calm workspace.</p>
      </div>

      <div class="status-row" aria-label="Account benefits">
        <span>Secure access</span>
        <span>Fast workspace sync</span>
      </div>
    </section>

    <section class="login-panel" aria-label="Login form">
      <div class="login-box">
        <p class="eyebrow">Member login</p>
        <h2>Sign in</h2>
        <p class="intro">Use your email and password to access your dashboard.</p>

        <form id="loginForm">
          <label>
            Email address
            <span class="input-wrap">
              <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required>
            </span>
          </label>

          <label>
            Password
            <span class="input-wrap password-field">
              <input id="password" type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
              <button class="toggle-password" type="button" aria-controls="password" aria-pressed="false">Show</button>
            </span>
          </label>

          <div class="form-options">
            <label class="remember">
              <input type="checkbox" name="remember">
              Remember me
            </label>
            <a href="#">Forgot password?</a>
          </div>

          <button class="submit-btn" type="submit">Log in</button>
          <p class="message" id="formMessage" role="status" aria-live="polite"></p>
        </form>

        <p class="signup">New here? <a href="#">Create an account</a></p>
      </div>
    </section>
  </main>

  <script>
    const passwordInput = document.querySelector("#password");
    const togglePassword = document.querySelector(".toggle-password");
    const loginForm = document.querySelector("#loginForm");
    const formMessage = document.querySelector("#formMessage");

    togglePassword.addEventListener("click", () => {
      const shouldShow = passwordInput.type === "password";
      passwordInput.type = shouldShow ? "text" : "password";
      togglePassword.textContent = shouldShow ? "Hide" : "Show";
      togglePassword.setAttribute("aria-pressed", String(shouldShow));
    });

    loginForm.addEventListener("submit", (event) => {
      event.preventDefault();
      formMessage.textContent = "Login form submitted. Connect this page to your backend to sign in.";
    });
  </script>
</body>
</html>
