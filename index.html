<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanity Test - Apex Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07090d;
        --panel: #121820;
        --gold: #f5b800;
        --gold-dark: #d99a00;
        --text: #f5f7fa;
        --muted: #aab2bf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(245, 184, 0, 0.12), transparent 34%),
          linear-gradient(180deg, #07090d 0%, #0b0f14 100%);
        color: var(--text);
      }

      .card {
        width: min(720px, calc(100vw - 48px));
        padding: 40px;
        border: 1px solid rgba(245, 184, 0, 0.28);
        border-radius: 24px;
        background: rgba(18, 24, 32, 0.88);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45), 0 0 48px rgba(245, 184, 0, 0.08);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(245, 184, 0, 0.14);
        color: var(--gold);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      h1 {
        margin: 24px 0 12px;
        font-size: clamp(32px, 5vw, 56px);
        line-height: 1;
      }

      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 22px;
        border: 0;
        border-radius: 14px;
        background: linear-gradient(180deg, var(--gold), var(--gold-dark));
        color: #15100a;
        font-weight: 800;
        text-decoration: none;
        box-shadow: 0 12px 32px rgba(245, 184, 0, 0.18);
      }

      .meta {
        margin-top: 24px;
        color: #7f8794;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge">✓ Sanity Test Passed</span>
      <h1>Apex Dashboard</h1>
      <p>
        The dark-mode gold theme is loading correctly. This quick index update confirms the app shell,
        typography, background, and primary button styling are rendering as expected.
      </p>
      <a class="button" href="#">Launch Dashboard</a>
      <div class="meta">Updated for desktop sanity testing.</div>
    </main>
  </body>
</html>
